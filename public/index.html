<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unterrichts-Bingo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0b0b14;
  --surface: rgba(255,255,255,0.05);
  --surface-hover: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.1);
  --border-hover: rgba(255,255,255,0.2);
  --text: #eee;
  --text-dim: #888;
  --green: #22c55e;
  --green-glow: rgba(34, 197, 94, 0.25);
  --green-bg: rgba(34, 197, 94, 0.15);
  --purple: #a855f7;
  --teal: #06b6d4;
  --amber: #f59e0b;
  --red: #ef4444;
  --r: 12px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 25% 15%, rgba(168,85,247,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 75% 85%, rgba(6,182,212,0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px;
  min-height: 100vh;
}

/* ── Lobby ──────────────────────────── */

.lobby {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 85vh;
  gap: 24px;
  max-width: 420px;
  width: 100%;
}

.logo {
  text-align: center;
  margin-bottom: 8px;
}

.logo h1 {
  font-size: 2.2rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--purple), var(--teal));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.15;
}

.logo p {
  color: var(--text-dim);
  font-size: 0.85rem;
  margin-top: 6px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 24px;
  width: 100%;
  backdrop-filter: blur(12px);
}

.card h2 {
  font-size: 0.95rem;
  font-weight: 700;
  margin-bottom: 16px;
}

.field {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: rgba(0,0,0,0.3);
  color: var(--text);
  font-size: 0.9rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}

.field:focus {
  border-color: var(--purple);
}

.field::placeholder { color: #555; }

.field-code {
  text-align: center;
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: 0.25em;
  text-transform: uppercase;
}

.fields {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 16px;
}

.cats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 16px;
}

.cat {
  padding: 9px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: transparent;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
}

.cat:hover { border-color: var(--border-hover); color: var(--text); }
.cat.on { border-color: var(--purple); color: #fff; background: rgba(168,85,247,0.15); }
.cat.on[data-c="si"] { border-color: var(--teal); background: rgba(6,182,212,0.15); }
.cat.on[data-c="wirtschaft"] { border-color: var(--amber); background: rgba(245,158,11,0.12); }
.cat.on[data-c="allgemein"] { border-color: var(--red); background: rgba(239,68,68,0.12); }

.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-go {
  background: linear-gradient(135deg, var(--purple), var(--teal));
  color: #fff;
}

.btn-go:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(168,85,247,0.3);
}

.btn-dim {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-dim:hover { border-color: var(--border-hover); }

.sep {
  display: flex;
  align-items: center;
  gap: 14px;
  color: #555;
  font-size: 0.75rem;
}

.sep::before, .sep::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Game ───────────────────────────── */

.game { display: none; width: 100%; max-width: 580px; }
.game.on { display: flex; flex-direction: column; align-items: center; }

.top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  margin-bottom: 16px;
  gap: 10px;
}

.room-info {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
}

.room-info .label {
  font-size: 0.6rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 700;
}

.room-info .code {
  font-size: 1.15rem;
  font-weight: 800;
  letter-spacing: 0.12em;
  background: linear-gradient(135deg, var(--purple), var(--teal));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.room-info .cat-label {
  font-size: 0.65rem;
  color: var(--text-dim);
  font-weight: 500;
}

.copy {
  background: none;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding: 2px 6px;
  font-size: 0.85rem;
  transition: color 0.15s;
}
.copy:hover { color: var(--text); }

.online {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.78rem;
  color: var(--text-dim);
}

.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px rgba(34,197,94,0.5);
}

.leave-btn {
  margin-bottom: 16px;
  align-self: stretch;
}

/* ── Grid ───────────────────────────── */

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  width: 100%;
  margin-bottom: 16px;
}

.c {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 5px;
  border-radius: 8px;
  font-size: 0.7rem;
  font-weight: 500;
  line-height: 1.2;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid var(--border);
  background: var(--surface);
  user-select: none;
  word-break: break-word;
  position: relative;
}

.c:hover {
  border-color: var(--border-hover);
  background: var(--surface-hover);
}

.c:active { transform: scale(0.96); }

.c.on {
  background: var(--green-bg);
  border-color: var(--green);
  box-shadow: 0 0 16px var(--green-glow);
  color: #fff;
  font-weight: 600;
}

.c.bingo {
  animation: glow 0.8s ease-in-out infinite alternate;
}

@keyframes glow {
  from { box-shadow: 0 0 12px var(--green-glow); }
  to { box-shadow: 0 0 28px rgba(34,197,94,0.45), 0 0 50px var(--green-glow); }
}

.c .who {
  position: absolute;
  bottom: 1px;
  right: 3px;
  font-size: 0.45rem;
  color: rgba(34,197,94,0.6);
  font-weight: 700;
  max-width: 90%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Banner ─────────────────────────── */

.banner {
  display: none;
  font-size: 2.4rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--green), var(--teal), var(--purple));
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shimmer 1.5s ease-in-out infinite;
  margin-bottom: 12px;
}

.banner.on { display: block; }

@keyframes shimmer {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

/* ── Players ────────────────────────── */

.players {
  font-size: 0.75rem;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 8px;
}

/* ── Toast ──────────────────────────── */

.toasts {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  z-index: 100;
}

.toast {
  background: rgba(15,15,25,0.92);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 0.8rem;
  color: var(--text);
  backdrop-filter: blur(12px);
  animation: tin 0.25s ease-out, tout 0.25s ease-in 2.5s forwards;
  box-shadow: 0 6px 24px rgba(0,0,0,0.5);
}

@keyframes tin {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes tout {
  to { opacity: 0; transform: translateY(-6px); }
}

/* ── Confetti ───────────────────────── */

.confetti {
  position: fixed;
  top: -10px;
  pointer-events: none;
  z-index: 999;
  animation: fall linear forwards;
}

@keyframes fall {
  0% { opacity: 1; }
  85% { opacity: 1; }
  100% { top: 105vh; transform: rotate(900deg); opacity: 0; }
}

/* ── Responsive ─────────────────────── */

@media (max-width: 480px) {
  .logo h1 { font-size: 1.7rem; }
  .grid { gap: 3px; }
  .c { font-size: 0.55rem; padding: 3px; border-radius: 6px; }
  .top { flex-direction: column; align-items: stretch; }
}

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="app">

  <!-- Lobby -->
  <div class="lobby" id="lobby">
    <div class="logo">
      <h1>Unterrichts-Bingo</h1>
      <p>Erstell einen Raum oder tritt einem bei</p>
    </div>

    <div class="card">
      <h2>Neuen Raum erstellen</h2>
      <div class="fields">
        <input class="field" id="createName" type="text" placeholder="Dein Name" maxlength="20" autocomplete="off">
      </div>
      <div class="cats" id="catPick">
        <button class="cat on" data-c="alle">Alle</button>
        <button class="cat" data-c="si">Systemintegration</button>
        <button class="cat" data-c="wirtschaft">Wirtschaft</button>
        <button class="cat" data-c="allgemein">Allgemein</button>
      </div>
      <button class="btn btn-go" id="createBtn">Raum erstellen</button>
    </div>

    <div class="sep">oder</div>

    <div class="card">
      <h2>Raum beitreten</h2>
      <div class="fields">
        <input class="field" id="joinName" type="text" placeholder="Dein Name" maxlength="20" autocomplete="off">
        <input class="field field-code" id="joinCode" type="text" placeholder="CODE" maxlength="5" autocomplete="off">
      </div>
      <button class="btn btn-dim" id="joinBtn">Beitreten</button>
    </div>
  </div>

  <!-- Game -->
  <div class="game" id="game">
    <div class="top">
      <div class="room-info">
        <div>
          <div class="label">Raum</div>
          <div class="code" id="roomCode">-</div>
          <div class="cat-label" id="catLabel"></div>
        </div>
        <button class="copy" id="copyBtn" title="Code kopieren">kopieren</button>
      </div>
      <div class="online">
        <div class="dot"></div>
        <span id="pCount">1 Spieler</span>
      </div>
    </div>

    <button class="btn btn-dim leave-btn" id="leaveBtn">Raum verlassen</button>

    <div class="banner" id="banner">BINGO!</div>
    <div class="grid" id="grid"></div>
    <div class="players" id="pList"></div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const $ = id => document.getElementById(id);
const lobbyEl = $('lobby');
const gameEl = $('game');
const gridEl = $('grid');
const bannerEl = $('banner');

let cat = 'alle';
let items = [];
let marked = new Set();
let hasBingo = false;

const catNames = {
  alle: 'Alle Kategorien',
  si: 'Systemintegration',
  wirtschaft: 'Wirtschaft',
  allgemein: 'Allgemein',
};

// ── Lobby ──────────────────────────────
$('catPick').addEventListener('click', e => {
  const b = e.target.closest('.cat');
  if (!b) return;
  $('catPick').querySelectorAll('.cat').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  cat = b.dataset.c;
});

$('createBtn').addEventListener('click', () => {
  const name = $('createName').value.trim() || 'Anon';
  socket.emit('create-room', { name, category: cat }, res => {
    if (res.error) return toast(res.error);
    enter(res);
  });
});

$('joinBtn').addEventListener('click', () => {
  const name = $('joinName').value.trim() || 'Anon';
  const code = $('joinCode').value.trim().toUpperCase();
  if (!code) return toast('Bitte Code eingeben');
  socket.emit('join-room', { name, code }, res => {
    if (res.error) return toast(res.error);
    enter(res);
  });
});

$('joinCode').addEventListener('keydown', e => {
  if (e.key === 'Enter') $('joinBtn').click();
});

$('createName').addEventListener('keydown', e => {
  if (e.key === 'Enter') $('createBtn').click();
});

// ── Enter game ─────────────────────────
function enter(data) {
  lobbyEl.classList.add('hidden');
  gameEl.classList.add('on');
  $('roomCode').textContent = data.code;
  $('catLabel').textContent = catNames[data.category] || '';
  items = data.items;
  marked = new Set(data.marked);
  hasBingo = false;
  bannerEl.classList.remove('on');
  render();
  updatePlayers(data.players);
}

// ── Render ─────────────────────────────
function render() {
  gridEl.innerHTML = '';
  for (let i = 0; i < 25; i++) {
    const el = document.createElement('div');
    el.className = 'c';
    el.textContent = items[i] || '';
    if (marked.has(i)) el.classList.add('on');
    el.addEventListener('click', () => socket.emit('toggle-cell', i));
    gridEl.appendChild(el);
  }
}

// ── Leave ──────────────────────────────
$('leaveBtn').addEventListener('click', () => location.reload());

// ── Copy ───────────────────────────────
$('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText($('roomCode').textContent)
    .then(() => toast('Code kopiert!'))
    .catch(() => {});
});

// ── Socket ─────────────────────────────
socket.on('cell-toggled', ({ index, marked: isMarked, by }) => {
  if (isMarked) {
    marked.add(index);
  } else {
    marked.delete(index);
    hasBingo = false;
    bannerEl.classList.remove('on');
    gridEl.querySelectorAll('.bingo').forEach(c => c.classList.remove('bingo'));
  }

  const cell = gridEl.children[index];
  if (!cell) return;
  cell.classList.toggle('on', isMarked);

  const old = cell.querySelector('.who');
  if (old) old.remove();

  if (isMarked && by) {
    const tag = document.createElement('span');
    tag.className = 'who';
    tag.textContent = by;
    cell.appendChild(tag);
  }
});

socket.on('bingo', ({ cells, by }) => {
  if (!hasBingo) {
    hasBingo = true;
    bannerEl.classList.add('on');
    confetti();
    toast('BINGO! ' + by + ' hat die Reihe komplettiert!');
  }
  cells.forEach(i => {
    const cell = gridEl.children[i];
    if (cell) cell.classList.add('bingo');
  });
});

socket.on('players-update', updatePlayers);
socket.on('player-joined', name => toast(name + ' ist beigetreten'));
socket.on('player-left', name => toast(name + ' hat den Raum verlassen'));

// ── Helpers ────────────────────────────
function updatePlayers(players) {
  $('pCount').textContent = players.length + ' Spieler';
  $('pList').textContent = players.join(', ');
}

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  $('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function confetti() {
  const colors = ['#22c55e', '#a855f7', '#06b6d4', '#f59e0b', '#ef4444', '#ec4899'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDuration = (2 + Math.random() * 3) + 's';
    el.style.animationDelay = Math.random() * 1.5 + 's';
    const s = 5 + Math.random() * 8;
    el.style.width = s + 'px';
    el.style.height = s + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 6000);
  }
}
</script>

</body>
</html>
